<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ApexFinance - Prototype</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --text: #1e293b; --success: #22c55e; --error: #ef4444; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .phone { width: 375px; height: 667px; background: white; border: 12px solid #333; border-radius: 40px; overflow: hidden; position: relative; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }
        .screen { display: none; padding: 20px; height: 100%; box-sizing: border-box; }
        .active { display: block; }
        nav { position: absolute; bottom: 0; width: 100%; height: 60px; background: white; border-top: 1px solid #ddd; display: flex; justify-content: space-around; align-items: center; }
        .nav-btn { cursor: pointer; color: #64748b; font-size: 12px; text-align: center; border: none; background: none; }
        .nav-btn.active { color: var(--primary); }
        .header { font-size: 24px; font-weight: bold; margin-bottom: 20px; color: var(--primary); }
        .card { background: #f1f5f9; padding: 15px; border-radius: 15px; margin-bottom: 15px; }
        .btn { width: 100%; padding: 12px; border-radius: 8px; border: none; background: var(--primary); color: white; cursor: pointer; font-weight: 600; margin-top: 10px; }
        .btn-alt { background: #e2e8f0; color: var(--text); }
        .transaction { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #e2e8f0; }
        .undo-toast { position: absolute; bottom: 80px; left: 10%; width: 80%; background: #333; color: white; padding: 10px; border-radius: 5px; text-align: center; display: none; }
    </style>
</head>
<body>

<div class="phone">
    <div id="screen-dash" class="screen active">
        <div class="header">Dashboard</div>
        <div class="card" style="background: var(--primary); color: white;">
            <p>Total Balance</p>
            <h1 id="balance">$4,250.00</h1>
        </div>
        <h3>Recent Activity</h3>
        <div class="transaction"><span>Grocery Store</span><b>-$45.20</b></div>
        <div class="transaction"><span>Salary Deposit</span><b style="color:var(--success)">+$2,100</b></div>
        <button class="btn" onclick="showScreen('screen-send')">Send Money</button>
    </div>

    <div id="screen-send" class="screen">
        <div class="header">Send Money</div>
        <p>Recipient</p>
        <div class="card">Alex Johnson (alex@mail.com)</div>
        <p>Amount</p>
        <input type="number" value="50.00" style="width:100%; padding:10px; font-size:18px;">
        <button class="btn" onclick="confirmTransfer()">Confirm Transfer</button>
        <button class="btn btn-alt" onclick="showScreen('screen-dash')">Cancel</button>
    </div>

    <div id="screen-goals" class="screen">
        <div class="header">Savings Goals</div>
        <div class="card">
            <p>New Car 🚗</p>
            <div style="height:10px; background:#ddd; border-radius:5px;"><div style="width:60%; height:100%; background:var(--success); border-radius:5px;"></div></div>
            <p>$3,000 / $5,000</p>
        </div>
        <button class="btn">Add New Goal</button>
    </div>

    <div id="screen-stats" class="screen">
        <div class="header">Spending</div>
        <div class="card">
            <p>This Month: $1,240</p>
            <div style="display:flex; height:100px; align-items: flex-end; gap:5px;">
                <div style="height:40%; flex:1; background:var(--primary);"></div>
                <div style="height:60%; flex:1; background:var(--primary);"></div>
                <div style="height:30%; flex:1; background:var(--primary);"></div>
                <div style="height:90%; flex:1; background:var(--primary);"></div>
            </div>
        </div>
        <p>High contrast view enabled for readability.</p>
    </div>

    <nav>
        <button class="nav-btn active" onclick="showScreen('screen-dash')">Home</button>
        <button class="nav-btn" onclick="showScreen('screen-goals')">Goals</button>
        <button class="nav-btn" onclick="showScreen('screen-stats')">Stats</button>
    </nav>
    <div id="undo" class="undo-toast">Transfer Sent! <span style="color:var(--primary); cursor:pointer" onclick="undo()">UNDO</span></div>
</div>

<script>
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    }
    function confirmTransfer() {
        document.getElementById('undo').style.display = 'block';
        setTimeout(() => { document.getElementById('undo').style.display = 'none'; showScreen('screen-dash'); }, 3000);
    }
    function undo() {
        alert("Transfer cancelled.");
        document.getElementById('undo').style.display = 'none';
        showScreen('screen-dash');
    }
</script>
</body>
</html>
